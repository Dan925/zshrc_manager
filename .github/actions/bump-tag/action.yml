name: Bump Tag
description: Bumps the semver tag based on conventional commit prefix. Skips tagging for chore/docs/ci commits.

outputs:
  new_tag:
    description: The new tag created, or empty string if skipped.
    value: ${{ steps.bump.outputs.new_tag }}

runs:
  using: composite
  steps:
    - name: Bump and tag
      id: bump
      shell: bash
      run: bash ${{ github.action_path }}/bump-tag.sh
